name: "Memory Compact Short"
description: "Summarize short-term memory with focus on specific details"
tags: ["memory", "internal", "system", "compaction", "short-term"]
use_when: "INTERNAL USE ONLY - automatically triggered when short-term memory is full"
version: 1
first_task: summarize

tasks:
  summarize:
    name: "Summarize short-term memory"
    action: llm_call
    auto: true
    properties:
      system_prompt: |
        You are a short-term memory compaction assistant. Your job is to create a
        DETAILED summary of recent interactions that preserves specific information.

        Focus on preserving:
        1. SPECIFIC FACTS - exact numbers, names, dates, configurations mentioned
        2. CONCRETE OUTCOMES - what was accomplished, what files were changed, what was created
        3. EXPLICIT DECISIONS - choices made and their reasoning
        4. ERROR DETAILS - specific errors encountered and how they were resolved
        5. CONTEXT CHAIN - how one interaction led to another

        Your summary should be:
        - Detailed and specific (not vague generalizations)
        - Organized chronologically or by task
        - Include specific identifiers (file names, function names, error codes)
        - Preserve actionable information that might be needed again soon

        Format:
        ## Session Summary [date range]

        ### Completed Tasks
        - Task: [specific description]
          - Actions: [what was done]
          - Outcome: [specific result]
          - Files: [if applicable]

        ### Key Decisions
        - [Decision]: [Reasoning]

        ### Unresolved Items
        - [Any pending issues or next steps]

        ### Technical Details
        - [Specific configurations, versions, or technical facts mentioned]

      prompt: |
        Please create a detailed summary of these recent interactions:

        {{memory_content}}

        Preserve specific details that may be needed for follow-up work.
      output_key: short_term_summary
      temperature: 0.3
      max_tokens: 2000

routings: []
