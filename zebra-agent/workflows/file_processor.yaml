name: "File Processor"
description: "Search, read, analyze, and process files with AI assistance"
tags: ["files", "filesystem", "search", "analyze", "process", "read", "write"]
use_when: "User needs to work with files - searching for files, reading content, analyzing file contents, extracting information, or writing results to files"
version: 1
first_task: understand_request

tasks:
  understand_request:
    name: "Understand the file processing request"
    action: llm_call
    auto: true
    properties:
      system_prompt: |
        You are a file processing assistant. Analyze the user's request and determine:
        1. What files they want to work with (path, pattern, or specific file)
        2. What operation they want to perform (search, read, analyze, transform, write)
        3. What output they expect

        Respond in JSON format:
        {
          "operation": "search|read|analyze|transform",
          "input_path": "path or pattern to find files",
          "pattern": "glob pattern like *.txt or **/*.py",
          "content_search": "optional regex to search file contents",
          "output_path": "optional path for output file",
          "analysis_type": "summarize|extract|count|custom",
          "custom_instructions": "any specific instructions"
        }
      prompt: "File processing request: {{goal}}"
      output_key: request_analysis
      response_format: json
      temperature: 0.2

  search_files:
    name: "Search for matching files"
    action: file_search
    auto: true
    properties:
      pattern: "{{request_analysis.pattern}}"
      directory: "{{request_analysis.input_path}}"
      content_pattern: "{{request_analysis.content_search}}"
      recursive: true
      max_results: 50
      output_key: found_files
      allow_absolute: true

  report_found:
    name: "Report found files"
    action: llm_call
    auto: true
    properties:
      system_prompt: |
        Summarize the file search results. List the files found and provide a brief overview.
        If no files were found, explain what was searched and suggest alternatives.
      prompt: |
        Search request: {{goal}}
        
        Files found: {{found_files}}
        Count: {{found_files_count}}
        
        Provide a summary of the search results.
      output_key: search_summary

  read_files:
    name: "Read file contents"
    action: file_read
    auto: true
    properties:
      path: "{{found_files[0]}}"
      output_key: file_content
      max_file_size: 1048576
      allow_absolute: true

  analyze_content:
    name: "Analyze file content with AI"
    action: llm_call
    auto: true
    properties:
      system_prompt: |
        You are a file content analyst. Analyze the provided file content based on the user's request.
        
        Provide insights, summaries, or extracted information as requested.
        Be thorough but concise. If the content is code, identify patterns, potential issues, or key functionality.
        If it's data, provide statistics or key observations.
      prompt: |
        User request: {{goal}}
        
        Analysis type: {{request_analysis.analysis_type}}
        Custom instructions: {{request_analysis.custom_instructions}}
        
        File content:
        {{file_content}}
        
        Analyze this content according to the request.
      output_key: analysis_result

  write_output:
    name: "Write analysis to file"
    action: file_write
    auto: true
    properties:
      path: "{{request_analysis.output_path}}"
      content: |
        # File Analysis Report
        
        ## Request
        {{goal}}
        
        ## Files Analyzed
        {{found_files}}
        
        ## Analysis Results
        {{analysis_result}}
        
        ---
        Generated by Zebra Agent File Processor
      create_dirs: true
      allow_absolute: true

  format_response:
    name: "Format the final response"
    action: llm_call
    auto: true
    properties:
      system_prompt: |
        Format a clear, helpful response to the user about the file processing that was completed.
        Include:
        - What files were found/processed
        - Key findings from the analysis
        - Where any output was written (if applicable)
        - Any recommendations or next steps
      prompt: |
        Original request: {{goal}}
        
        Files found: {{found_files}}
        Search summary: {{search_summary}}
        Analysis: {{analysis_result}}
        
        Provide a final summary for the user.
      output_key: final_response

routings:
  - from: understand_request
    to: search_files
  - from: search_files
    to: report_found
  - from: report_found
    to: read_files
  - from: read_files
    to: analyze_content
  - from: analyze_content
    to: format_response
    condition: "{{request_analysis.output_path == null}}"
  - from: analyze_content
    to: write_output
    condition: "{{request_analysis.output_path != null}}"
  - from: write_output
    to: format_response
