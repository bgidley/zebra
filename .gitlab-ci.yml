stages:
  - lint
  - test
  - e2e
  - pre-prod
  - deploy

default:
  tags:
    - opc-shell
  before_script:
    - uv sync --all-packages --frozen

variables:
  DJANGO_SETTINGS_MODULE: zebra_agent_web.settings
  UV_CACHE_DIR: /home/opc/.cache/uv

lint:
  stage: lint
  script:
    - uv run ruff check .
    - uv run ruff format --check .

unit:
  stage: test
  script:
    - uv run pytest -m "not e2e and not smoke" --ignore=zebra-agent-web/tests/e2e_live --ds=zebra_agent_web.test_settings

e2e:
  stage: e2e
  script:
    - cp /home/opc/projects/zebra/.env .env
    # Prevent the production ORACLE_DSN in .env from overriding E2E exports
    - sed -i 's/^ORACLE_DSN=.*/ORACLE_DSN=/' .env
    - |
      if [ -n "$E2E_ORACLE_DSN" ]; then
        # Use dedicated e2e Oracle schema
        export ORACLE_DSN="$E2E_ORACLE_DSN" ORACLE_USERNAME="$E2E_ORACLE_USERNAME" ORACLE_PASSWORD="$E2E_ORACLE_PASSWORD"
        uv run python zebra-agent-web/manage.py migrate --noinput --fake-initial
        uv run python zebra-agent-web/manage.py flush --noinput
        uv run pytest zebra-agent-web/tests/e2e/ -m e2e
      else
        # Fallback: force SQLite via --ds so Django never sees Oracle DSN
        uv run pytest zebra-agent-web/tests/e2e/ -m e2e --ds=zebra_agent_web.e2e_settings
      fi

e2e-live:
  stage: e2e
  script:
    - cp /home/opc/projects/zebra/.env .env
    - VCR_RECORD_MODE=none uv run pytest zebra-agent-web/tests/e2e_live/
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

pre-prod:
  stage: pre-prod
  script:
    # Hard fail if E2E Oracle credentials are not injected — no SQLite fallback
    - '[ -z "$E2E_ORACLE_DSN" ] && { echo "ERROR: E2E_ORACLE_DSN not set. Ensure E2E_ORACLE_* CI variables are unprotected."; exit 1; }'
    - uv run python scripts/gen_version.py > version.json
    # Clean up any container left by a previous failed run
    - podman stop zebra-preprod 2>/dev/null || true
    - podman rm   zebra-preprod 2>/dev/null || true
    # Build image — no --env-file, no .env mount; production credentials never enter this container
    - podman build --no-cache -t zebra-preprod:$CI_COMMIT_SHORT_SHA .
    # Start container on port 8001 with E2E Oracle credentials only
    - |
      podman run -d \
        --name zebra-preprod \
        -p 8001:8000 \
        -e ORACLE_DSN="$E2E_ORACLE_DSN" \
        -e ORACLE_USERNAME="$E2E_ORACLE_USERNAME" \
        -e ORACLE_PASSWORD="$E2E_ORACLE_PASSWORD" \
        -e DJANGO_ALLOWED_HOSTS='*' \
        zebra-preprod:$CI_COMMIT_SHORT_SHA
    # Wait up to 60 s for the login page to respond
    - |
      for i in $(seq 1 30); do
        if curl -sf -o /dev/null http://localhost:8001/accounts/login/; then
          echo "Container ready after ${i} attempts"; break
        fi
        [ $i -eq 30 ] && { echo "Timeout waiting for container"; podman logs zebra-preprod; exit 1; }
        sleep 2
      done
    # Create smoke user (idempotent)
    - |
      podman exec zebra-preprod python /app/zebra-agent-web/manage.py shell -c "
      from django.contrib.auth import get_user_model
      U = get_user_model()
      U.objects.filter(username='smoke').exists() or U.objects.create_user('smoke', password='smokepass123')
      "
    # Run smoke tests against the live container
    - ZEBRA_SMOKE_URL=http://localhost:8001 uv run pytest zebra-agent-web/tests/smoke/ -m smoke -v
  after_script:
    - podman stop zebra-preprod 2>/dev/null || true
    - podman rm   zebra-preprod 2>/dev/null || true
    - podman rmi  zebra-preprod:$CI_COMMIT_SHORT_SHA 2>/dev/null || true
  resource_group: zebra-preprod

deploy:
  stage: deploy
  script:
    # docker-compose.yml mounts ./.env into the container; the authoritative
    # copy lives at /home/opc/projects/zebra/.env on the VM.
    - cp /home/opc/projects/zebra/.env .env
    # Bake git version metadata into the image at build time (git not in container)
    - uv run python scripts/gen_version.py > version.json
    - podman-compose up -d --build --force-recreate
    - podman-compose ps
  rules:
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"
  resource_group: zebra-prod
