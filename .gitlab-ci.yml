stages:
  - lint
  - test
  - e2e
  - deploy
  - smoke
  # OKE migration stages (gated by $OKE_ENABLED; no-ops until the cluster is live).
  # Ordered build -> smoke -> deploy: validate the exact image, then promote it.
  - oke_build
  - oke_smoke
  - oke_deploy

default:
  tags:
    - opc-shell
  before_script:
    - uv sync --all-packages --frozen

variables:
  DJANGO_SETTINGS_MODULE: zebra_agent_web.settings
  UV_CACHE_DIR: /var/cache/uv

lint:
  stage: lint
  script:
    - uv run ruff check .
    - uv run ruff format --check .

unit:
  stage: test
  script:
    - uv run pytest -m "not e2e and not smoke" --ignore=zebra-agent-web/tests/e2e_live --ignore=zebra-agent-web/tests/smoke --ds=zebra_agent_web.test_settings

e2e:
  stage: e2e
  # Auto-recover transient ADB connection drops (e.g. DPY-4011). The per-pipeline
  # schema is dropped in after_script and re-created (drop-if-exists) on retry.
  retry: 2
  script:
    - cp /home/gitlab-runner/.env .env
    # Provisioner creds live in a SEPARATE runner file (.env.e2e), never the prod
    # .env — the prod container bash-sources .env, and the DSN's '(' ')' would break
    # that. Extract paren-safely (the DSN must not be bash-sourced).
    - export E2E_PROVISIONER_DSN="$(sed -n 's/^E2E_PROVISIONER_DSN=//p' /home/gitlab-runner/.env.e2e 2>/dev/null)"
    - export E2E_PROVISIONER_USERNAME="$(sed -n 's/^E2E_PROVISIONER_USERNAME=//p' /home/gitlab-runner/.env.e2e 2>/dev/null)"
    - export E2E_PROVISIONER_PASSWORD="$(sed -n 's/^E2E_PROVISIONER_PASSWORD=//p' /home/gitlab-runner/.env.e2e 2>/dev/null)"
    # Blank the prod ORACLE_DSN so pytest-dotenv can't select the prod DB.
    - sed -i 's/^ORACLE_DSN=.*/ORACLE_DSN=/' .env
    - |
      if [ -n "$E2E_PROVISIONER_DSN" ] && [ -n "$E2E_PROVISIONER_USERNAME" ] && [ -n "$E2E_PROVISIONER_PASSWORD" ]; then
        # Per-pipeline ephemeral Oracle schema — real prod parity, fully isolated.
        export E2E_SCHEMA="E2E_$(printf '%s' "$CI_COMMIT_REF_SLUG" | tr 'a-z-' 'A-Z_' | tr -cd 'A-Z0-9_' | cut -c1-8)_${CI_PIPELINE_ID}"
        # Generate the schema password in-shell (never written to a file or logged);
        # reuse the same value for ORACLE_PASSWORD below.
        export E2E_SCHEMA_PASSWORD="Az9$(openssl rand -hex 13)"
        echo "Provisioning ephemeral Oracle schema $E2E_SCHEMA"
        uv run python scripts/e2e_oracle_schema.py create --schema "$E2E_SCHEMA"
        export ORACLE_DSN="$E2E_PROVISIONER_DSN"
        export ORACLE_USERNAME="$E2E_SCHEMA"
        export ORACLE_PASSWORD="$E2E_SCHEMA_PASSWORD"
        uv run python zebra-agent-web/manage.py migrate --noinput
        uv run pytest zebra-agent-web/tests/e2e/ -m e2e
      else
        # Fallback (no provisioner creds on the runner): SQLite. Feature-branch flake possible.
        echo "E2E_PROVISIONER_* not set — falling back to SQLite e2e"
        uv run pytest zebra-agent-web/tests/e2e/ -m e2e --ds=zebra_agent_web.e2e_settings
      fi
  after_script:
    # Always drop the ephemeral schema (after_script runs even on failure/cancel).
    # Fresh shell here, so re-extract creds and recompute the deterministic name.
    - |
      export E2E_PROVISIONER_DSN="$(sed -n 's/^E2E_PROVISIONER_DSN=//p' /home/gitlab-runner/.env.e2e 2>/dev/null)"
      export E2E_PROVISIONER_USERNAME="$(sed -n 's/^E2E_PROVISIONER_USERNAME=//p' /home/gitlab-runner/.env.e2e 2>/dev/null)"
      export E2E_PROVISIONER_PASSWORD="$(sed -n 's/^E2E_PROVISIONER_PASSWORD=//p' /home/gitlab-runner/.env.e2e 2>/dev/null)"
      if [ -n "$E2E_PROVISIONER_DSN" ]; then
        SCHEMA="E2E_$(printf '%s' "$CI_COMMIT_REF_SLUG" | tr 'a-z-' 'A-Z_' | tr -cd 'A-Z0-9_' | cut -c1-8)_${CI_PIPELINE_ID}"
        echo "Dropping ephemeral Oracle schema $SCHEMA"
        uv run python scripts/e2e_oracle_schema.py drop --schema "$SCHEMA" || true
      fi

e2e-live:
  stage: e2e
  script:
    - cp /home/gitlab-runner/.env .env
    - VCR_RECORD_MODE=none uv run pytest zebra-agent-web/tests/e2e_live/
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

deploy:
  stage: deploy
  script:
    # docker-compose.yml mounts ./.env into the container; the authoritative
    # copy lives at /home/gitlab-runner/.env on the VM.
    - cp /home/gitlab-runner/.env .env
    # Bake git version metadata into the image at build time (git not in container)
    - uv run python scripts/gen_version.py > version.json
    - uv tool run podman-compose build --no-cache
    - uv tool run podman-compose up -d --force-recreate
    - uv tool run podman-compose ps
    # Wait for the container to accept requests, then provision the smoke user
    - timeout 60 sh -c 'until curl -sf http://localhost:8000/api/health/ > /dev/null; do sleep 2; done'
    - >-
      [ -z "$SMOKE_PASSWORD" ] || uv tool run podman-compose exec -e SMOKE_PASSWORD -T web
      python zebra-agent-web/manage.py shell -c
      "import os; from django.contrib.auth.models import User;
      u,_=User.objects.get_or_create(username='smoke');
      u.set_password(os.environ['SMOKE_PASSWORD']); u.save();
      print('Smoke user ready')"
  rules:
    # VM (podman-compose) deploy — runs until OKE is switched on.
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push" && $OKE_ENABLED != "true"
  resource_group: zebra-prod

smoke:
  stage: smoke
  script:
    - uv run pytest zebra-agent-web/tests/smoke/ -v -m smoke
  variables:
    SMOKE_BASE_URL: "http://localhost:8000"
  rules:
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push" && $OKE_ENABLED != "true"
      when: on_success

# ===========================================================================
# OKE pipeline (F109) — build once -> validate in an ephemeral smoke namespace
# -> promote the SAME image to prod. Gated by $OKE_ENABLED == "true" so it stays
# dormant until the cluster exists (F110). The VM deploy/smoke above are gated off
# at the same time, so exactly one path runs.
# ===========================================================================
.oke_rules: &oke_rules
  rules:
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push" && $OKE_ENABLED == "true"

oke_build:
  stage: oke_build
  <<: *oke_rules
  tags:
    - oke-k8s
  script:
    # Build the web image once and push it to OCIR tagged with the commit SHA.
    - uv run python scripts/gen_version.py > version.json
    - BUILD_CLAUDE="${BUILD_CLAUDE:-0}" bash deploy/oke/scripts/25-build-push.sh "$CI_COMMIT_SHORT_SHA"

oke_smoke:
  stage: oke_smoke
  <<: *oke_rules
  tags:
    - oke-k8s
  script:
    # Stand up an ephemeral smoke instance of :$SHA against the smoke Oracle schema,
    # run the smoke suite, and tear the namespace down (handled inside the script).
    - SMOKE_PASSWORD="$SMOKE_PASSWORD" bash deploy/oke/scripts/50-smoke.sh "$CI_COMMIT_SHORT_SHA"

oke_deploy:
  stage: oke_deploy
  <<: *oke_rules
  tags:
    - oke-k8s
  resource_group: zebra-prod
  script:
    # Promote the exact validated image to prod (no rebuild), then prune OCIR.
    # Pruning is registry housekeeping (needs the oci CLI + compartment OCID,
    # not available on every runner) — best-effort, must not fail a good deploy.
    - bash deploy/oke/scripts/40-deploy.sh "$CI_COMMIT_SHORT_SHA"
    - KEEP="${OCIR_KEEP:-5}" bash deploy/oke/scripts/prune-ocir.sh || echo "WARN: OCIR prune skipped/failed (non-fatal)"
