apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Aggregate of the long-lived workloads. `kustomize build base` renders
# namespaces + prod web/daemon + claude-code. The smoke overlay is applied
# separately and ephemerally by 50-smoke.sh.
resources:
  - namespaces.yaml
  - prod-web
  - prod-daemon
  - claude-code
# NOTE: identity/permission objects (claude-code + mac-claude SAs, their
# RoleBindings/ClusterRoleBindings, and the cross-namespace bindings) are NOT in
# this CI-applied base. They live in ../cluster-rbac and are applied out-of-band by
# an operator (scripts/35-cluster-rbac.sh), because the CI deploy runner
# (oke-ci-deployer) is intentionally scoped to workloads and cannot manage RBAC.
