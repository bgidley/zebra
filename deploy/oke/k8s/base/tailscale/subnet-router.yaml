# Tailscale subnet router — advertises the cluster service + pod CIDRs onto the
# tailnet so tailnet devices reach prod (and any service) privately, no public LB.
# Userspace networking (no /dev/net/tun needed); state persisted in a k8s Secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-subnet-router
  namespace: tailscale
  labels:
    app: tailscale-subnet-router
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tailscale-subnet-router
  template:
    metadata:
      labels:
        app: tailscale-subnet-router
    spec:
      serviceAccountName: tailscale
      imagePullSecrets:
        - name: ocir-pull
      containers:
        - name: tailscale
          # Mirrored into OCIR (avoids Docker Hub anonymous pull rate limits on the node).
          # Refresh with: buildah pull docker.io/tailscale/tailscale:stable && buildah tag … && push
          image: REGISTRY/zebra/tailscale:stable
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_KUBE_SECRET
              value: tailscale-state
            - name: TS_USERSPACE
              value: "true"
            # Advertise the k8s service CIDR (reach prod ClusterIP) + pod CIDR.
            - name: TS_ROUTES
              value: "10.96.0.0/16,10.244.0.0/16,10.20.0.0/16"
            - name: TS_EXTRA_ARGS
              value: "--hostname=zebra-oke --accept-dns=false"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Serve HTTPS on the tailnet node, proxying to the prod ClusterIP.
            # Tailscale auto-issues a Let's Encrypt cert for zebra-oke.tailf1e473.ts.net.
            - name: TS_SERVE_CONFIG
              value: /etc/tailscale-serve/config.json
          volumeMounts:
            - name: serve-config
              mountPath: /etc/tailscale-serve
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: serve-config
          configMap:
            name: tailscale-serve-config
