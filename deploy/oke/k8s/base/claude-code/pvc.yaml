apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-workspace
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: oci-bv # OCI Block Volume CSI (default in OKE)
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-config
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: oci-bv
  resources:
    requests:
      storage: 5Gi
