# Private by design — ClusterIP only, NO public LoadBalancer. Reach prod via:
#   kubectl -n prod port-forward svc/zebra-web 8000:80   (kubeconfig-authenticated)
# For day-to-day private access, front it with an OCI *internal* LB
# (annotation service.beta.kubernetes.io/oci-load-balancer-internal: "true") reachable
# over a VPN/peered VCN, or a Tailscale subnet router on the cluster (matches the VM).
apiVersion: v1
kind: Service
metadata:
  name: zebra-web
spec:
  type: ClusterIP
  selector:
    app: zebra-web
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
