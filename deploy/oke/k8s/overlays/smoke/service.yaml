apiVersion: v1
kind: Service
metadata:
  name: zebra-web
spec:
  # In-cluster only — reached as http://zebra-web.smoke.svc.cluster.local
  # by the pipeline's smoke tests. No LoadBalancer; nothing public.
  type: ClusterIP
  selector:
    app: zebra-web
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
