apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: smoke
resources:
  - deployment.yaml
  - service.yaml
# 50-smoke.sh injects the exact image-under-test:
#   kustomize edit set image zebra-web=<ocir_registry>/zebra/zebra-web:<sha>
images:
  - name: zebra-web
    newName: REGISTRY/zebra/zebra-web
    newTag: latest
