name: "Human Interaction Demo"
description: "Demonstrates data entry and data display actions"
version: 1
first_task: welcome

tasks:
  welcome:
    name: "Welcome Message"
    action: data_display
    auto: true
    properties:
      title: "Welcome to the Survey"
      message: "Please complete the following survey about your experience."
      fields:
        - label: "Survey Type"
          value: "Customer Satisfaction"
        - label: "Estimated Time"
          value: "5 minutes"
      output_key: welcome_acknowledged

  collect_info:
    name: "Collect User Information"
    action: data_entry
    auto: true
    properties:
      title: "Personal Information"
      fields:
        - name: name
          label: "Full Name"
          type: text
          required: true
          description: "Please enter your full name"
        - name: email
          label: "Email Address"
          type: text
          required: true
          description: "We'll use this to send you results"
        - name: age
          label: "Age"
          type: number
          required: false
        - name: subscribe
          label: "Subscribe to newsletter"
          type: boolean
          default: true
      output_key: user_info

  collect_feedback:
    name: "Collect Feedback"
    action: data_entry
    auto: true
    properties:
      title: "Your Feedback"
      fields:
        - name: rating
          label: "Overall Rating"
          type: select
          required: true
          options: ["Excellent", "Good", "Fair", "Poor"]
          description: "Rate your overall experience"
        - name: would_recommend
          label: "Would you recommend us?"
          type: boolean
          required: true
        - name: comments
          label: "Additional Comments"
          type: text
          required: false
          description: "Any additional feedback you'd like to share"
      output_key: feedback

  show_summary:
    name: "Show Summary"
    action: data_display
    auto: true
    properties:
      title: "Thank You!"
      message: "Here's a summary of your responses:"
      fields:
        - label: "Name"
          value: "{{user_info.name}}"
        - label: "Email"
          value: "{{user_info.email}}"
        - label: "Rating"
          value: "{{feedback.rating}}"
        - label: "Would Recommend"
          value: "{{feedback.would_recommend}}"
      require_confirmation: true
      output_key: summary_confirmed

routings:
  - from: welcome
    to: collect_info
  - from: collect_info
    to: collect_feedback
  - from: collect_feedback
    to: show_summary
