<a href="{{ url }}"
   class="group flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-md
          {% if is_active %}bg-gray-900 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">
    
    {% if icon == "dashboard" %}
    <svg class="h-5 w-5 {% if is_active %}text-indigo-400{% else %}text-gray-400 group-hover:text-gray-300{% endif %}" 
         fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z" />
    </svg>
    {% elif icon == "code" %}
    <svg class="h-5 w-5 {% if is_active %}text-indigo-400{% else %}text-gray-400 group-hover:text-gray-300{% endif %}"
         fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
    </svg>
    {% elif icon == "play" %}
    <svg class="h-5 w-5 {% if is_active %}text-indigo-400{% else %}text-gray-400 group-hover:text-gray-300{% endif %}"
         fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    {% elif icon == "clipboard" %}
    <svg class="h-5 w-5 {% if is_active %}text-indigo-400{% else %}text-gray-400 group-hover:text-gray-300{% endif %}"
         fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
    </svg>
    {% elif icon == "agent" %}
    <svg class="h-5 w-5 {% if is_active %}text-indigo-400{% else %}text-gray-400 group-hover:text-gray-300{% endif %}"
         fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
    </svg>
    {% elif icon == "zap" %}
    <svg class="h-5 w-5 {% if is_active %}text-indigo-400{% else %}text-gray-400 group-hover:text-gray-300{% endif %}"
         fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z" />
    </svg>
    {% elif icon == "library" %}
    <svg class="h-5 w-5 {% if is_active %}text-indigo-400{% else %}text-gray-400 group-hover:text-gray-300{% endif %}"
         fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z" />
    </svg>
    {% elif icon == "history" %}
    <svg class="h-5 w-5 {% if is_active %}text-indigo-400{% else %}text-gray-400 group-hover:text-gray-300{% endif %}"
         fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    {% endif %}
    
    {{ label }}
</a>
