{% if state == "complete" %}
<span class="px-2 py-1 text-xs font-medium rounded bg-green-900 text-green-300">complete</span>
{% elif state == "running" %}
<span class="px-2 py-1 text-xs font-medium rounded bg-blue-900 text-blue-300">running</span>
{% elif state == "paused" %}
<span class="px-2 py-1 text-xs font-medium rounded bg-yellow-900 text-yellow-300">paused</span>
{% elif state == "failed" %}
<span class="px-2 py-1 text-xs font-medium rounded bg-red-900 text-red-300">failed</span>
{% elif state == "created" %}
<span class="px-2 py-1 text-xs font-medium rounded bg-gray-700 text-gray-300">created</span>
{% else %}
<span class="px-2 py-1 text-xs font-medium rounded bg-gray-700 text-gray-300">{{ state }}</span>
{% endif %}
