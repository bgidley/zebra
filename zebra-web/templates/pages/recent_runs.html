{% extends "base.html" %}

{% block title %}Recent Runs - Zebra{% endblock %}
{% block page_title %}Recent Runs{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-white">Recent Runs</h1>
            <p class="text-gray-400 mt-1">History of goal executions</p>
        </div>
        <a href="/agent/run/" 
           class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            Run Goal
        </a>
    </div>
    
    <!-- Runs List -->
    <div id="runs-list" class="bg-gray-800 rounded-lg border border-gray-700">
        {% include "partials/recent_runs_list.html" %}
    </div>
</div>
{% endblock %}
