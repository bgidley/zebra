{% extends "base.html" %}

{% block title %}Pending Tasks - Zebra{% endblock %}
{% block page_title %}Pending Tasks{% endblock %}

{% block content %}
<div class="space-y-6" hx-get="/tasks/" hx-trigger="every 5s" hx-target="#tasks-list" hx-swap="innerHTML">
    <!-- Header -->
    <div>
        <h1 class="text-2xl font-bold text-white">Pending Tasks</h1>
        <p class="text-gray-400 mt-1">Tasks waiting for user input</p>
    </div>
    
    <!-- Tasks List -->
    <div id="tasks-list">
        {% include "partials/tasks_list.html" %}
    </div>
</div>
{% endblock %}
