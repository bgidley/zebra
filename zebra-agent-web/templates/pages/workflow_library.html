{% extends "base.html" %}

{% block title %}Workflow Library - Zebra Agent{% endblock %}
{% block page_title %}Workflow Library{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-white">Workflow Library</h1>
            <p class="text-gray-400 mt-1">Manage your workflow definitions</p>
        </div>
        <button @click="$refs.createModal.showModal()"
                class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            New Workflow
        </button>
    </div>
    
    <!-- Workflow List -->
    <div id="workflow-list" class="bg-gray-800 rounded-lg border border-gray-700">
        {% include "partials/workflow_library_list.html" %}
    </div>
</div>

<!-- Create Workflow Modal -->
<dialog x-ref="createModal" class="bg-gray-800 rounded-lg border border-gray-700 p-0 w-full max-w-2xl backdrop:bg-gray-900/80">
    <div class="p-6">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-semibold text-white">Create Workflow</h2>
            <button @click="$refs.createModal.close()" class="text-gray-400 hover:text-white">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        
        <form hx-post="/workflows/create/" 
              hx-swap="none">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Workflow YAML</label>
                    <textarea name="yaml_content" rows="15" required
                              class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-white font-mono text-sm 
                                     focus:outline-none focus:ring-2 focus:ring-indigo-500"
                              placeholder="name: My Workflow
description: What this workflow does
tags: [tag1, tag2]
version: 1
first_task: start

tasks:
  start:
    name: Start Task
    action: llm_call
    auto: true
    properties:
      prompt: '{{goal}}'
      output_key: result"></textarea>
                </div>
            </div>
            
            <div class="flex justify-end gap-3 mt-6">
                <button type="button" @click="$refs.createModal.close()"
                        class="px-4 py-2 text-gray-300 hover:text-white transition-colors">
                    Cancel
                </button>
                <button type="submit"
                        class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors">
                    Create Workflow
                </button>
            </div>
        </form>
    </div>
</dialog>
{% endblock %}
