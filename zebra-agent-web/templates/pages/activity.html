{% extends "base.html" %}

{% block title %}Activity - Zebra Agent{% endblock %}
{% block page_title %}Activity{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between flex-wrap gap-4">
        <div>
            <h1 class="text-2xl font-bold text-white">Activity</h1>
            <p class="text-gray-400 mt-1">Goals and their tasks</p>
        </div>
        <div class="flex items-center gap-4">
            <!-- Filters -->
            <div class="flex items-center gap-3 bg-gray-800 rounded-lg px-3 py-2 border border-gray-700">
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                    <input type="checkbox"
                           {% if human_only %}checked{% endif %}
                           hx-get="{% url 'activity' %}"
                           hx-target="#activity-list"
                           hx-swap="outerHTML"
                           hx-vals='js:{"human_only": event.target.checked ? "true" : "false", "show_completed": document.getElementById("show-completed-toggle").checked ? "true" : "false"}'
                           class="rounded bg-gray-700 border-gray-600 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-gray-800"
                           id="human-only-toggle">
                    <span class="text-gray-300">Human tasks only</span>
                </label>
                <span class="text-gray-600">|</span>
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                    <input type="checkbox"
                           {% if show_completed %}checked{% endif %}
                           hx-get="{% url 'activity' %}"
                           hx-target="#activity-list"
                           hx-swap="outerHTML"
                           hx-vals='js:{"show_completed": event.target.checked ? "true" : "false", "human_only": document.getElementById("human-only-toggle").checked ? "true" : "false"}'
                           class="rounded bg-gray-700 border-gray-600 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-gray-800"
                           id="show-completed-toggle">
                    <span class="text-gray-300">Include completed</span>
                </label>
            </div>
            <a href="/run/"
               class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                Run Goal
            </a>
        </div>
    </div>

    <!-- Activity List -->
    {% include "partials/activity_list.html" %}
</div>

<script>
// Initialize all workflow diagrams on page load
document.addEventListener('DOMContentLoaded', function() {
    WorkflowDiagram.initAll();
});

// Re-initialize diagrams after HTMX swaps
document.body.addEventListener('htmx:afterSwap', function(event) {
    WorkflowDiagram.initAll();
});
</script>
{% endblock %}
