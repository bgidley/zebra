{% extends "base.html" %}

{% block title %}Activity - Zebra Agent{% endblock %}
{% block page_title %}Activity{% endblock %}

{% block content %}
<div x-data="activityTable()" @htmx:after-swap.window="restoreSelections()" class="space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between flex-wrap gap-4">
        <div>
            <h1 class="text-2xl font-bold text-white">Activity</h1>
            <p class="text-gray-400 mt-1">Goals and their tasks</p>
        </div>
        <div class="flex items-center gap-4">
            <!-- Group-by toggle -->
            <div class="flex items-center bg-gray-800 rounded-lg border border-gray-700 p-0.5">
                <a href="{% url 'activity' %}?group_by=status&human_only={{ human_only|yesno:'true,false' }}&show_completed={{ show_completed|yesno:'true,false' }}"
                   class="px-3 py-1.5 text-xs font-medium rounded-md transition-colors {% if group_by == 'status' %}bg-gray-700 text-white{% else %}text-gray-400 hover:text-gray-300{% endif %}">
                    By Status
                </a>
                <a href="{% url 'activity' %}?group_by=date&human_only={{ human_only|yesno:'true,false' }}&show_completed={{ show_completed|yesno:'true,false' }}"
                   class="px-3 py-1.5 text-xs font-medium rounded-md transition-colors {% if group_by == 'date' %}bg-gray-700 text-white{% else %}text-gray-400 hover:text-gray-300{% endif %}">
                    By Date
                </a>
            </div>
            <!-- Filters -->
            <div class="flex items-center gap-3 bg-gray-800 rounded-lg px-3 py-2 border border-gray-700">
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                    <input type="checkbox"
                           {% if human_only %}checked{% endif %}
                           hx-get="{% url 'activity' %}"
                           hx-target="#activity-list"
                           hx-swap="outerHTML"
                           hx-vals='js:{"human_only": event.target.checked ? "true" : "false", "show_completed": document.getElementById("show-completed-toggle").checked ? "true" : "false", "group_by": "{{ group_by }}"}'
                           class="rounded bg-gray-700 border-gray-600 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-gray-800"
                           id="human-only-toggle">
                    <span class="text-gray-300">Human tasks only</span>
                </label>
                <span class="text-gray-600">|</span>
                <label class="flex items-center gap-2 text-sm cursor-pointer">
                    <input type="checkbox"
                           {% if show_completed %}checked{% endif %}
                           hx-get="{% url 'activity' %}"
                           hx-target="#activity-list"
                           hx-swap="outerHTML"
                           hx-vals='js:{"show_completed": event.target.checked ? "true" : "false", "human_only": document.getElementById("human-only-toggle").checked ? "true" : "false", "group_by": "{{ group_by }}"}'
                           class="rounded bg-gray-700 border-gray-600 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-gray-800"
                           id="show-completed-toggle">
                    <span class="text-gray-300">Show full history</span>
                </label>
            </div>
            <a href="/run/"
               class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                Run Goal
            </a>
        </div>
    </div>

    <!-- Activity List -->
    {% include "partials/activity_list.html" %}

    <!-- Hidden inputs for bulk cancel form (managed by Alpine) -->
    <div id="bulk-pids" style="display:none">
        <template x-for="pid in getSelectedProcessIds()" :key="pid">
            <input type="hidden" name="process_ids" :value="pid">
        </template>
    </div>
</div>

<script>
function activityTable() {
    return {
        selectedIds: new Set(),

        toggleSelect(id) {
            if (this.selectedIds.has(id)) {
                this.selectedIds.delete(id);
            } else {
                this.selectedIds.add(id);
            }
            // Trigger reactivity
            this.selectedIds = new Set(this.selectedIds);
        },

        toggleAll(event) {
            const checked = event.target.checked;
            const checkboxes = document.querySelectorAll('#activity-list input[type="checkbox"][data-row-id]');
            if (checked) {
                checkboxes.forEach(cb => {
                    if (!cb.disabled) this.selectedIds.add(cb.dataset.rowId);
                });
            } else {
                this.selectedIds.clear();
            }
            this.selectedIds = new Set(this.selectedIds);
        },

        get selectedCount() {
            return this.selectedIds.size;
        },

        get allSelected() {
            const checkboxes = document.querySelectorAll('#activity-list input[type="checkbox"][data-row-id]:not(:disabled)');
            return checkboxes.length > 0 && this.selectedIds.size >= checkboxes.length;
        },

        restoreSelections() {
            // Prune IDs that no longer exist in the DOM after HTMX swap
            const remaining = new Set();
            this.selectedIds.forEach(id => {
                if (document.querySelector(`[data-row-id="${id}"]`)) {
                    remaining.add(id);
                }
            });
            this.selectedIds = remaining;
        },

        getSelectedProcessIds() {
            const pids = [];
            this.selectedIds.forEach(id => {
                const el = document.querySelector(`[data-row-id="${id}"]`);
                if (el && el.dataset.processIds) {
                    el.dataset.processIds.split(',').forEach(pid => {
                        if (pid && !pids.includes(pid)) pids.push(pid);
                    });
                }
            });
            return pids;
        },

        get hasSelectedCancellable() {
            return this.getSelectedProcessIds().length > 0;
        }
    }
}
</script>
{% endblock %}
