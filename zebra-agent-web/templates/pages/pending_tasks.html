{% extends "base.html" %}

{% block title %}Pending Tasks - Zebra Agent{% endblock %}
{% block page_title %}Pending Tasks{% endblock %}

{% block content %}
<div class="max-w-4xl">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-bold text-white">Pending Tasks</h1>
            <p class="text-sm text-gray-400 mt-1">Tasks awaiting your input</p>
        </div>
        <button hx-get="{% url 'pending_tasks' %}"
                hx-target="#pending-tasks-list"
                hx-swap="outerHTML"
                class="px-3 py-1.5 text-sm rounded-md bg-gray-700 text-gray-300
                       hover:bg-gray-600 hover:text-white">
            Refresh
        </button>
    </div>

    {% include "partials/pending_tasks_list.html" %}
</div>
{% endblock %}
